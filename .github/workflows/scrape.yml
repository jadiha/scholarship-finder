name: Daily Scholarship Scrape

on:
  schedule:
    - cron: "0 13 * * *"   # 8am EST (13:00 UTC) every day
  workflow_dispatch:         # lets you trigger it manually from GitHub UI

permissions:
  contents: write            # needed to commit seen.json + dashboard back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Commit updated seen.json and dashboard
        run: |
          git config user.name "scholarship-bot"
          git config user.email "bot@scholarship-finder"
          git add seen.json docs/
          git diff --staged --quiet || git commit -m "chore: update scholarships [$(date +'%Y-%m-%d')]"
          git push

name: Daily Scholarship Scrape

on:
  schedule:
    - cron: "0 13 * * *"   # 8am EST (13:00 UTC) every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Write config
        env:
          GPA: ${{ secrets.GPA }}
          FINANCIAL_NEED: ${{ secrets.FINANCIAL_NEED }}
          FIRST_GEN: ${{ secrets.FIRST_GEN }}
          VISIBLE_MINORITY: ${{ secrets.VISIBLE_MINORITY }}
        run: |
          python3 - << 'PYEOF'
          import os, textwrap, yaml
          config = textwrap.dedent(f"""
            profile:
              year: 3
              program: systems_design_engineering
              school: university_of_waterloo
              gender: female
              citizenship: canadian
              gpa: {os.environ.get("GPA", "3.5")}
              financial_need: {os.environ.get("FINANCIAL_NEED", "false")}
              first_gen: {os.environ.get("FIRST_GEN", "false")}
              visible_minority: {os.environ.get("VISIBLE_MINORITY", "false")}
              leadership: true
              stem_volunteering: true
              target_industry: software
            filters:
              min_amount: 500
              include_no_amount: true
            notifications:
              discord: true
              github_pages: true
          """).strip()
          open("config.yaml", "w").write(config)
          yaml.safe_load(open("config.yaml"))
          print("Config OK")
          PYEOF

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Commit updated seen.json and dashboard
        run: |
          git config user.name "scholarship-bot"
          git config user.email "bot@scholarship-finder"
          git add seen.json docs/
          git diff --staged --quiet || git commit -m "chore: update scholarships [$(date +'%Y-%m-%d')]"
          git push
